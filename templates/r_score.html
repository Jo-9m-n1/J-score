{% extends "layout.html" %}


{% block body %}
<main>
    <form action="result" method="post">
        <section class="subject"> 
            <h2>What's the name of the subject?</h2>
                <p>
                    <label for="subject">Answer:</label>
                    <input type="text" id="subject" name="subject" required>
                </p>
        </section>
        <section class="grade">
            <h2>What grade did you earn in the class? (0-100%)</h2>
                <p>
                    <label for="grade">Answer:</label>
                    <input type="number" id="grade" name="grade" min="0" step="0.1" max="100" required> %
                </p>
        </section>
        <section class="class_grade">
            <h2>What was the class average grade (mean) in %?</h2>
                <p>
                    <label for="class_grade">Answer:</label>
                    <input type="number" id="class_grade" name="class_grade" min="0" step="0.1" max="100" required> %
                </p>
        </section>
        <section class="class_std">
            <h2>What was the class’s standard deviation (in %)?</h2>
                <p>
                    <label for="class_std">Answer:</label>
                    <input type="number" id="class_std" name="std" min="0" step="0.1" max="50" required> %
                </p>
        </section>
        <section class="credits">
            <h2>How many credits was that class worth?</h2>
                <p>
                    <label for="credits">Answer:</label>
                    <select id="credits" name="credits">
                        <option value="">Select credits</option>
                        <option value="1.00">1.00 credit (2h class/week)</option>
                        <option value="2.00">2.00 credits (3h class/week)</option>
                        <option value="2.33">2.33 credits (4h class/week)</option>
                        <option value="2.66">2.66 credits (5h class/week)</option>
                    </select>
                </p>
        </section>
        <button type="submit">Submit</button>
    </form>
</main>

{% endblock %}
