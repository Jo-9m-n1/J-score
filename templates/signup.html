{% extends "layout.html" %}

{% block title %}

<title>Sign up</title>

{% endblock %}

{% block body %}
<main>
    <form action="{{ url_for('signup_result') }}" method="POST">
        <label>Username:</label>
        <input type="text" name="username">

        <label>Password:</label>
        <input type="password" name="password">

        <button type="submit">Sign Up</button>
    </form>
</main>

{% endblock %}
