{% extends "layout.html" %}

{% block title %}

<title>Your r-score</title>

{% endblock %}

{% block body %}

<main>
    <h1>Your calculated r-score for {{ subject}} is {{ r_score }}</h1>
    <p>
        Please note that this is an approximate value
    </p>
    <p>
        <a href="{{ url_for('result') }}">Submit another one!</a>
    </p>
    <p>
        <a href="{{ url_for('index')}}">Find out how it is calculated!</a>
    </p>
</main>

{% endblock %}
