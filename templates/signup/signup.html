{% extends "layout.html" %}

{% block title %}

<title>Sign Up - J-Score</title>

{% endblock %}

{% block body %}
<main>
    <h1>Sign up:</h1>
    <form action="{{ url_for('signup_result') }}" method="POST">
        <p>
            <label>Name:</label>
            <input type="text" name="name" placeholder="Bob" required>
        </p>
        <p>
            <label>Username:</label>
            <input type="text" name="nickname" placeholder="Bob1234" required>
        </p>
        <p>
            <label>Password:</label>
            <input type="password" name="password" required>
        </p>
        <p>
            <button type="submit">Sign Up</button>
        </p>
    </form>
    <p>
        Forgot your password? <a href="{{ url_for('password') }}">Find your password!</a>
    </p>
    <p>
        Already have an account? <a href="{{ url_for('r_score') }}">Calculate the R-Score!</a>
    </p>
</main>

{% endblock %}

{% block footer %}
{% endblock %}
